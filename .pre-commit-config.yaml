repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: skylos-gate
        name: skylos quality gate
        entry: skylos . --gate --quality --secrets --danger --no-upload --format concise
        language: system
        pass_filenames: false
        always_run: true
